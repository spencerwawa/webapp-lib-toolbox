# ============================================================
# nginx config for GitNexus Web UI
# ============================================================
# GitNexus uses KuzuDB compiled to WebAssembly. WASM with
# SharedArrayBuffer requires Cross-Origin Isolation, which
# means the server MUST respond with these two headers:
#
#   Cross-Origin-Opener-Policy: same-origin
#   Cross-Origin-Embedder-Policy: require-corp
#
# Without them, KuzuDB (and any in-browser graph queries)
# will fail silently in the browser.
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cross-Origin Isolation headers — required for KuzuDB WASM + SharedArrayBuffer
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Serve static assets with long cache (Vite fingerprints filenames)
    location ~* \.(js|css|wasm|woff2?|ttf|svg|png|ico|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-add isolation headers for asset responses too
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        try_files $uri =404;
    }

    # SPA fallback — all unknown paths serve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access logs for health checks / static files to reduce noise
    access_log off;
    error_log /var/log/nginx/gitnexus-error.log warn;
}
